<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Channel Studio — Gmail · SMS · RCS · WhatsApp mockups</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  :root{ --font:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; }
  body{ font-family:var(--font); background:#f4f5f8; color:#0c0e14; display:flex; flex-direction:column; height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
  header{ flex:none; display:flex; align-items:center; gap:16px; padding:0 18px; height:60px; background:rgba(255,255,255,.9); backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid #e9eaf0; z-index:2; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .brand .mark{ width:32px; height:32px; border-radius:9px; background:linear-gradient(140deg,#635bff,#8b5cf6 55%,#22c1c3); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(99,91,255,.35); }
  .brand .mark svg{ width:18px; height:18px; }
  .brand h1{ font-size:15px; font-weight:650; letter-spacing:-.3px; } .brand small{ display:block; font-size:11px; color:#7a8194; font-weight:450; }
  nav{ display:flex; gap:3px; background:#f4f5f8; border:1px solid #e9eaf0; border-radius:11px; padding:3px; margin-left:6px; }
  nav button{ border:0; background:none; color:#7a8194; font-family:inherit; font-size:13px; font-weight:600; padding:8px 15px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:.14s; letter-spacing:-.1px; }
  nav button:hover{ color:#0c0e14; } nav button.on{ background:#fff; color:#0c0e14; box-shadow:0 1px 2px rgba(16,18,30,.06); }
  nav button .ic{ font-size:14px; }
  .spacer{ flex:1; }
  .note{ font-size:11.5px; color:#9aa0b0; font-weight:500; }
  main{ flex:1; min-height:0; position:relative; background:#eef0f5; }
  iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; background:#eef0f5; }
  .loading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#9aa0b0; font-size:13px; pointer-events:none; gap:9px; }
  .spin{ width:15px; height:15px; border:2px solid #d7d9e3; border-top-color:#635bff; border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  @media (max-width:720px){ .brand small,.note{ display:none; } nav button{ padding:8px 11px; } header{ gap:8px; padding:0 10px; } }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5z" fill="#fff" opacity=".95"/><circle cx="9" cy="10.5" r="1.3" fill="#635bff"/><circle cx="13" cy="10.5" r="1.3" fill="#635bff"/><circle cx="17" cy="10.5" r="1.3" fill="#635bff"/></svg></div>
    <div><h1>Channel Studio</h1><small>Realistic channel mockups for decks</small></div>
  </div>
  <nav id="nav">
    <button data-tool="gmail-preview-tool/index.html" data-key="gmail" class="on"><span class="ic">✉️</span>Gmail</button>
    <button data-tool="messaging-preview-tool/index.html?channel=whatsapp" data-key="whatsapp"><span class="ic">🟢</span>WhatsApp</button>
    <button data-tool="messaging-preview-tool/index.html?channel=rcs" data-key="rcs"><span class="ic">📱</span>RCS</button>
    <button data-tool="messaging-preview-tool/index.html?channel=sms" data-key="sms"><span class="ic">💬</span>SMS</button>
  </nav>
  <div class="spacer"></div>
  <div class="note">Self-contained · host anywhere</div>
</header>
<main>
  <div class="loading" id="loading"><span class="spin"></span> Loading…</div>
  <iframe id="frame" title="channel preview" src="gmail-preview-tool/index.html"></iframe>
</main>
<script>
  var frame=document.getElementById('frame'), loading=document.getElementById('loading');
  frame.addEventListener('load',function(){ loading.style.display='none'; });
  document.querySelectorAll('#nav button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('#nav button').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on'); loading.style.display='flex'; frame.src=b.dataset.tool;
      if(history.replaceState) history.replaceState(null,'','#'+b.dataset.key);
    });
  });
  (function(){ var h=(location.hash||'').replace('#','').toLowerCase();
    var btn=document.querySelector('#nav button[data-key="'+h+'"]'); if(btn) btn.click(); })();
</script>
</body>
</html>
