<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Channel Studio — Facebook Ads</title>
<link rel="stylesheet" href="../channel-studio.css">
<style>
  /* channel-studio.css overrides — Facebook surfaces are app-native */
  .logo-prev img{ object-fit:cover; }
  .notch{ top:0; } .punch{ top:13px; }
  .vb{ display:inline-block; vertical-align:-2px; margin-left:3px; }

  /* ===================== Facebook FEED ad ===================== */
  .fbf{ flex:1; display:flex; flex-direction:column; min-height:0; background:#f0f2f5; color:#050505; }
  .fb-appbar{ height:46px; flex:none; display:flex; align-items:center; padding:0 12px; background:#fff; border-bottom:1px solid #dadde1; }
  .fb-wm{ font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; font-size:23px; font-weight:800; color:#1877f2; letter-spacing:-1px; flex:1; }
  .fb-abr{ display:flex; gap:9px; }
  .fb-abr .c{ width:34px; height:34px; border-radius:50%; background:#e4e6eb; display:flex; align-items:center; justify-content:center; color:#050505; }
  .fb-abr svg{ width:19px; height:19px; }
  .fb-feed{ flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
  .fb-post{ flex:none; background:#fff; }
  .fb-post-h{ display:flex; align-items:center; gap:9px; padding:11px 12px 8px; }
  .fb-post-h .av{ width:40px; height:40px; border-radius:50%; object-fit:cover; flex:none; }
  .fb-post-h .pn{ flex:1; min-width:0; line-height:1.25; }
  .fb-post-h .nm{ font-size:14px; font-weight:600; color:#050505; display:flex; align-items:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fb-post-h .sub{ font-size:12px; color:#65676b; display:flex; align-items:center; gap:4px; margin-top:1px; }
  .fb-post-h .sub svg{ width:12px; height:12px; }
  .fb-post-h .more{ color:#65676b; flex:none; display:flex; gap:14px; } .fb-post-h .more svg{ width:20px; height:20px; }
  .fb-primary{ font-size:14px; line-height:1.4; color:#050505; padding:0 12px 9px; }
  .fb-media{ width:100%; aspect-ratio:1/1; background:#e4e6eb; overflow:hidden; }
  .fb-media img{ width:100%; height:100%; object-fit:cover; display:block; }
  .fb-link{ display:flex; align-items:center; gap:10px; background:#f0f2f5; padding:10px 12px; }
  .fb-link .lx{ flex:1; min-width:0; }
  .fb-link .url{ font-size:11.5px; color:#65676b; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fb-link .hl{ font-size:15px; font-weight:700; color:#050505; line-height:1.25; margin-top:2px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .fb-link .ds{ font-size:12.5px; color:#65676b; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fb-cta{ flex:none; background:#e4e6eb; color:#050505; font-size:13.5px; font-weight:700; padding:9px 15px; border-radius:7px; white-space:nowrap; }
  .fb-counts{ display:flex; align-items:center; justify-content:space-between; padding:9px 12px 7px; font-size:12.5px; color:#65676b; }
  .fb-counts .rx{ display:flex; align-items:center; gap:5px; }
  .fb-rc{ display:flex; }
  .fb-rc span{ width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:-4px; box-shadow:0 0 0 2px #fff; }
  .fb-rc span:first-child{ margin-left:0; }
  .fb-rc .like{ background:#1877f2; } .fb-rc .love{ background:#f33e58; }
  .fb-rc svg{ width:11px; height:11px; color:#fff; }
  .fb-actions{ display:flex; border-top:1px solid #ced0d4; margin:0 12px; }
  .fb-act{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 0; color:#65676b; font-size:13.5px; font-weight:600; }
  .fb-act svg{ width:19px; height:19px; }
  .fb-nav{ height:48px; flex:none; display:flex; align-items:center; justify-content:space-around; background:#fff; border-top:1px solid #dadde1; }
  .fb-nav svg{ width:24px; height:24px; color:#65676b; }
  .fb-nav .on svg{ color:#1877f2; }

  /* ===================== Facebook STORY ad ===================== */
  .fbs{ position:relative; flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; background:#000; }
  .fbs-media{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .fbs-scrim-t{ position:absolute; left:0; right:0; top:0; height:170px; z-index:1; background:linear-gradient(rgba(0,0,0,.42), transparent); pointer-events:none; }
  .fbs-scrim-b{ position:absolute; left:0; right:0; bottom:0; height:230px; z-index:1; background:linear-gradient(transparent, rgba(0,0,0,.6)); pointer-events:none; }
  .fbs .statusbar{ position:relative; z-index:3; }
  .fbs-top{ position:relative; z-index:3; }
  .fbs-bars{ display:flex; gap:3px; padding:8px 9px 0; }
  .fbs-bars .b{ flex:1; height:2.5px; border-radius:2px; background:rgba(255,255,255,.35); overflow:hidden; }
  .fbs-bars .b i{ display:block; height:100%; background:#fff; border-radius:2px; }
  .fbs-head{ display:flex; align-items:center; gap:9px; padding:11px 12px 0; }
  .fbs-head .av{ width:34px; height:34px; border-radius:50%; object-fit:cover; flex:none; box-shadow:0 0 0 1px rgba(255,255,255,.5); }
  .fbs-head .hn{ font-size:14px; font-weight:600; color:#fff; display:flex; align-items:center; text-shadow:0 1px 6px rgba(0,0,0,.4); }
  .fbs-head .sp{ font-size:12.5px; color:rgba(255,255,255,.85); text-shadow:0 1px 6px rgba(0,0,0,.4); }
  .fbs-head .dots{ margin-left:auto; color:#fff; } .fbs-head .dots svg{ width:20px; height:20px; }
  .fbs-head .x{ color:#fff; } .fbs-head .x svg{ width:22px; height:22px; }
  .fbs-spacer{ flex:1; min-height:0; }
  .fbs-ctawrap{ position:relative; z-index:3; padding:0 16px 10px; }
  .fbs-cta{ display:flex; align-items:center; justify-content:center; gap:7px; background:#fff; color:#050505; font-size:15px; font-weight:700; padding:12px; border-radius:9px; box-shadow:0 4px 16px rgba(0,0,0,.25); }
  .fbs-cta .ar{ display:flex; } .fbs-cta svg{ width:16px; height:16px; }
  .fbs-bottom{ position:relative; z-index:3; display:flex; align-items:center; gap:13px; padding:2px 14px 8px; }
  .fbs-bottom .reply{ flex:1; height:40px; border:1.5px solid rgba(255,255,255,.7); border-radius:999px; color:rgba(255,255,255,.95); display:flex; align-items:center; padding:0 16px; font-size:13.5px; }
  .fbs-bottom .ic{ color:#fff; } .fbs-bottom .ic svg{ width:24px; height:24px; }
  .fbs .home-ind{ position:relative; z-index:3; }

  /* ===================== Facebook MARKETPLACE ad ===================== */
  .fbm{ flex:1; display:flex; flex-direction:column; min-height:0; background:#fff; color:#050505; }
  .fbm-head{ height:48px; flex:none; display:flex; align-items:center; gap:12px; padding:0 14px; }
  .fbm-head .tl{ font-size:22px; font-weight:800; letter-spacing:-.5px; flex:1; }
  .fbm-head .ic{ display:flex; gap:8px; }
  .fbm-head .c{ width:34px; height:34px; border-radius:50%; background:#e4e6eb; display:flex; align-items:center; justify-content:center; color:#050505; }
  .fbm-head svg{ width:19px; height:19px; }
  .fbm-search{ margin:2px 12px 10px; height:38px; background:#f0f2f5; border-radius:999px; display:flex; align-items:center; gap:9px; padding:0 14px; color:#65676b; font-size:14px; flex:none; }
  .fbm-search svg{ width:16px; height:16px; }
  .fbm-sec{ font-size:16px; font-weight:800; letter-spacing:-.3px; padding:0 12px 9px; flex:none; }
  .fbm-grid{ flex:1; min-height:0; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 12px 12px; align-content:start; }
  .fbm-card{ min-width:0; }
  .fbm-card .img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#e4e6eb; border-radius:10px; }
  .fbm-card .pr{ font-size:15px; font-weight:700; margin-top:5px; }
  .fbm-card .ti{ font-size:13px; color:#050505; line-height:1.25; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fbm-card .lo{ font-size:12px; color:#65676b; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fbm-card.ad .img{ box-shadow:0 0 0 1.5px #dadde1; }
  .fbm-card.ad .sp{ font-size:12px; color:#65676b; margin-top:2px; font-weight:600; }
  .fbm-card.ad .cta{ display:block; text-align:center; margin-top:7px; background:#e4e6eb; color:#050505; font-weight:700; font-size:13px; padding:8px; border-radius:7px; }
</style>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="editor" id="editor">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M7 5.5h10a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-4.8l-3.4 2.6c-.6.45-1.3.02-1.3-.72V15.5H7a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3z" fill="#fff"/><path d="M11.8 7.6c.15 1.75.7 2.3 2.45 2.45-1.75.15-2.3.7-2.45 2.45-.15-1.75-.7-2.3-2.45-2.45 1.75-.15 2.3-.7 2.45-2.45z" fill="#7c6df6"/></svg></div>
      <div><h1>Channel Studio</h1><small>Facebook ad mockups</small></div>
    </div>

    <div class="ctx">
      <div class="sel-wrap"><label>Channel</label>
        <select class="sel" id="selChannel">
          <option value="gmail">Gmail</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="rcs">RCS</option>
          <option value="sms">SMS</option>
          <option value="push">Push</option>
          <option value="inapp">In-App</option>
          <option value="game">In-App Gamification</option>
          <option value="instagram">Instagram Ads</option>
          <option value="facebook">Facebook Ads</option>
        </select>
      </div>
      <div class="sel-wrap"><label>Industry</label><select class="sel" id="selIndustry"></select></div>
      <div class="sel-wrap" id="subWrap"><label>Sub-industry</label><select class="sel" id="selSub"></select></div>
    </div>
    <div class="divider"></div>

    <div class="group collapsed" data-group>
      <button class="ghead" data-head>Templates <span class="chev">▼</span></button>
      <div class="gbody">
        <div class="hint">Ready-made, industry-specific ad creative. They render in whichever <b>format</b> (Feed / Story) is selected up top.</div>
        <div class="tpl-grid" id="tplGrid"></div>
        <button class="btn reset block" id="clearMsgs" style="margin-top:11px;"><svg viewBox="0 0 24 24" fill="none"><path d="M4 4v5h5M20 20v-5h-5M19 9a8 8 0 00-14.5-2.5M5 15a8 8 0 0014.5 2.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Clear &amp; start blank</button>
      </div>
    </div>

    <div class="group collapsed" data-group>
      <button class="ghead" data-head>Advertiser (Page) <span class="chev">▼</span></button>
      <div class="gbody">
        <label class="f"><span>Page name</span><input type="text" id="fbPage"></label>
        <div class="toggle-row"><span>Verified badge</span><label class="switch"><input type="checkbox" id="fbVerified" checked><span class="slider"></span></label></div>
        <label class="f"><span>Page photo</span>
          <div class="drop" id="avDrop"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2"/></svg> Upload photo (or use monogram)</div>
          <input type="file" id="avInput" accept="image/*" hidden>
          <div class="logo-prev" id="avPrev" style="display:none;"><img id="avImg"><button class="link-btn" id="avClear">Remove</button></div>
        </label>
      </div>
    </div>

    <div class="group collapsed" data-group>
      <button class="ghead" data-head>Creative <span class="chev">▼</span></button>
      <div class="gbody">
        <div class="f"><span>Ad media (image)</span><div class="imgz" id="fbMedia"></div></div>
        <label class="f" id="wPrimary"><span>Primary text</span><textarea id="fbPrimary" placeholder="The text above the image…"></textarea></label>
        <label class="f" id="wHeadline"><span>Headline (link)</span><input type="text" id="fbHeadline"></label>
        <label class="f" id="wPrice"><span>Price</span><input type="text" id="fbPrice"></label>
        <label class="f" id="wDesc"><span>Link description</span><input type="text" id="fbDesc"></label>
        <label class="f" id="wUrl"><span>Display URL</span><input type="text" id="fbUrl"></label>
        <label class="f"><span>Call-to-action button</span><select class="sel" id="fbCta"></select></label>
      </div>
    </div>

    <div class="group collapsed fmt-feed" data-group>
      <button class="ghead" data-head>Engagement <span class="chev">▼</span></button>
      <div class="gbody">
        <div class="hint">Shown on the <b>Feed</b> ad — reactions, comments, shares and the timestamp.</div>
        <div class="row2">
          <label class="f"><span>Reactions</span><input type="text" id="fbReactions"></label>
          <label class="f"><span>Comments</span><input type="text" id="fbComments"></label>
        </div>
        <div class="row2">
          <label class="f"><span>Shares</span><input type="text" id="fbShares"></label>
          <label class="f"><span>Timestamp</span><input type="text" id="fbTime" value="2h"></label>
        </div>
      </div>
    </div>
  </aside>

  <!-- ============ STAGE ============ -->
  <div class="stage-wrap">
    <div class="topbar">
      <div class="seg" id="deviceSeg">
        <button data-device="ios" class="on"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="2" width="12" height="20" rx="3" stroke="currentColor" stroke-width="2"/></svg>iPhone</button>
        <button data-device="android"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="2" width="12" height="20" rx="2" stroke="currentColor" stroke-width="2"/><path d="M10 5h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Android</button>
      </div>
      <select class="topsel" id="topVar"></select>
      <div class="grow"></div>
      <button class="btn ghost" id="btnPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>Simulate</button>
      <button class="btn ghost" id="btnAI"></button>
      <button class="btn ghost" id="btnRecord"></button>
      <button class="btn ghost" id="btnCopy">Copy</button>
      <button class="btn primary" id="btnExport"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Export</button>
    </div>
    <div class="stage" id="stage"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="../images.js" onerror="window.__PXIMG=window.__PXIMG||{}"></script>
<script src="../image-system.js"></script>
<script src="../content.js"></script>
<script src="../blocks.js"></script>
<script src="../device.js"></script>
<script src="../gif-encoder.js"></script>
<script src="../recorder.js"></script>
<script src="../nav.js"></script>
<script src="../ai.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" onerror="window.__noH2C=true"></script>
<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmtLite=s=>esc(s).replace(/\*(.+?)\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
  function oneLine(s){ return (s||'').replace(/[*_~]/g,'').replace(/\s*\n\s*/g,' ').trim(); }

  function ctxId(){ return state.sub || state.industry; }

  // ---------- State ----------
  const state={
    channel:'facebook', device:'ios', format:'feed', play:false,
    industry:'ecom', sub:'fashion', brandLogo:null,
    fb:{ page:'Nova', verified:true, media:'', primary:'', headline:'', desc:'', url:'nova.shop',
         price:'$89', cta:'Shop Now', reactions:'1,204', comments:'86', shares:'32', time:'2h' },
  };
  const pageName=()=>state.fb.page;

  const FB_CTAS=['Shop Now','Learn More','Sign Up','Install Now','Get Offer','Book Now','Order Now','Download','Send Message','Contact Us'];
  const FB_BLUE='#1877f2';

  // ---------- Icons ----------
  const FB_IC={
    like:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 10v10H4a1 1 0 01-1-1v-8a1 1 0 011-1h3zm0 0l4-7a2 2 0 012 2v3h5.5a2 2 0 011.95 2.45l-1.6 7A2 2 0 0117 20H7" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
    comment:'<svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.5 8.5 0 01-11.9 7.8L3 21l1.7-5.6A8.5 8.5 0 1121 11.5z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
    share:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 018-8v-3l7 6-7 6v-3a5 5 0 00-5 5v1H4v-4z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
    thumb:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 10l3.5-6a1.5 1.5 0 012.9.5V8h3.4a1.4 1.4 0 011.37 1.72l-1.3 6A1.6 1.6 0 0116.3 17H8v-7zM4 10h2v7H4a1 1 0 01-1-1v-5a1 1 0 011-1z"/></svg>',
    heart:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 20s-7-4.35-9.5-8.5C1 8.5 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 3.5 3.5 6.5C19 15.65 12 20 12 20z"/></svg>',
    globe:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 12h17M12 3.5c2.5 2.4 2.5 14.6 0 17M12 3.5c-2.5 2.4-2.5 14.6 0 17" stroke="currentColor" stroke-width="1.4"/></svg>',
    dots:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg>',
    x:'<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    chevR:'<svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    search:'<svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    dm:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.2 2 2 6.3 2 11.8c0 3 1.4 5.6 3.7 7.4V23l3.4-1.9c.9.25 1.9.4 2.9.4 5.8 0 10-4.3 10-9.7C22 6.3 17.8 2 12 2zm1 13l-2.6-2.7L5.5 15l5.4-5.7 2.6 2.7L18.3 9 13 15z"/></svg>',
    home:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6.5L20 11M6 9.5V19a1 1 0 001 1h3v-5h4v5h3a1 1 0 001-1V9.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    video:'<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="3" stroke="currentColor" stroke-width="1.9"/><path d="M10 9.5l4 2.5-4 2.5z" fill="currentColor"/></svg>',
    shop:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 8h16l-1 12H5L4 8zM8 8V6a4 4 0 018 0v2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    bell:'<svg viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6zM9.5 20a2.5 2.5 0 005 0" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>',
    menu:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  };
  // Facebook "f" round logo (blue circle, white f) — accurate, export-safe inline SVG.
  const FB_LOGO='<svg viewBox="0 0 24 24" width="26" height="26" role="img" aria-label="Facebook"><circle cx="12" cy="12" r="11" fill="#1877f2"/><path d="M13.4 12h1.9l.35-2.35H13.4V8.15c0-.68.22-1.14 1.2-1.14h1.15V4.9c-.56-.07-1.5-.16-2.35-.16-2 0-3.28 1.2-3.28 3.42v1.49H8.6V12h1.52v6.02h3.28V12z" fill="#fff"/></svg>';
  const VBADGE='<svg class="vb" viewBox="0 0 24 24" width="13" height="13"><path fill="#1877f2" d="M12 1.2l2.5 1.9 3.1-.4 1.3 2.9 2.8 1.5-.9 3 .9 3-2.8 1.5-1.3 2.9-3.1-.4L12 22.8l-2.5-1.9-3.1.4-1.3-2.9L2.3 17l.9-3-.9-3 2.8-1.5 1.3-2.9 3.1.4L12 1.2z"/><path fill="#fff" d="M10.6 15.2L7.7 12.3l1.2-1.2 1.7 1.7 3.7-3.7 1.2 1.2-4.9 4.9z"/></svg>';

  // ---------- Simulate affordance ----------
  function optAttr(o){ if(!state.play) return ''; return ` data-opt="1" data-reply="${esc(o.reply||'')}"`; }
  const ck=on=> (state.play&&on)?' clickable':'';

  // ---------- Identity helpers ----------
  function fbAvatar(cls){ const nm=state.fb.page; const src=state.brandLogo||brandMark(nm,96); return `<img class="${cls}" src="${src}" alt="${esc(nm)}">`; }
  const statusBar=lt=>statusBarHTML(state.device,lt);
  function mediaSrc(){ return state.fb.media || photo(KW[ctxId()]||'product', 800, state.format==='story'?1400:1000); }
  const mediaAlt=()=> kwFor(state.fb.primary)||kwFor(state.fb.headline)||KW[ctxId()]||'ad';

  // ---------- FEED ad ----------
  function fbNav(){ return `<span class="on">${FB_IC.home}</span>${FB_IC.video}${FB_IC.shop}${FB_IC.bell}${FB_IC.menu}`; }
  function renderFeed(){
    const f=state.fb;
    const linkMod = (f.headline||f.desc||f.url) ? `<div class="fb-link"><div class="lx"><div class="url">${esc(f.url||'')}</div>${f.headline?`<div class="hl">${esc(f.headline)}</div>`:''}${f.desc?`<div class="ds">${esc(f.desc)}</div>`:''}</div><div class="fb-cta${ck(true)}"${optAttr({reply:f.cta})}>${esc(f.cta||'Shop Now')}</div></div>` : '';
    return `<div class="fbf">
      ${statusBar(false)}
      <div class="fb-appbar"><span class="fb-wm">facebook</span><span class="fb-abr"><span class="c">${FB_IC.search}</span><span class="c">${FB_IC.dm}</span></span></div>
      <div class="fb-feed">
        <div class="fb-post">
          <div class="fb-post-h">
            ${fbAvatar('av')}
            <div class="pn"><div class="nm">${esc(f.page)}${f.verified?VBADGE:''}</div><div class="sub">Sponsored · ${FB_IC.globe}</div></div>
            <span class="more">${FB_IC.dots}${FB_IC.x}</span>
          </div>
          ${f.primary?`<div class="fb-primary">${fmtLite(f.primary)}</div>`:''}
          <div class="fb-media"><img src="${esc(mediaSrc())}" alt="${esc(mediaAlt())}"></div>
          ${linkMod}
          <div class="fb-counts">
            <div class="rx"><span class="fb-rc"><span class="like">${FB_IC.thumb}</span><span class="love">${FB_IC.heart}</span></span><span>${esc(f.reactions||'0')}</span></div>
            <div>${esc(f.comments||'0')} comments · ${esc(f.shares||'0')} shares</div>
          </div>
          <div class="fb-actions">
            <div class="fb-act">${FB_IC.like}Like</div>
            <div class="fb-act">${FB_IC.comment}Comment</div>
            <div class="fb-act">${FB_IC.share}Share</div>
          </div>
        </div>
      </div>
      <div class="fb-nav">${fbNav()}</div>
      <div class="home-ind"></div>
    </div>`;
  }

  // ---------- STORY ad ----------
  function renderStory(){
    const f=state.fb;
    return `<div class="fbs">
      <img class="fbs-media" src="${esc(mediaSrc())}" alt="${esc(mediaAlt())}">
      <div class="fbs-scrim-t"></div><div class="fbs-scrim-b"></div>
      ${statusBar(true)}
      <div class="fbs-top">
        <div class="fbs-bars"><span class="b"><i style="width:42%"></i></span><span class="b"></span><span class="b"></span></div>
        <div class="fbs-head">
          ${fbAvatar('av')}
          <span class="hn">${esc(f.page)}${f.verified?VBADGE:''}</span>
          <span class="sp">Sponsored</span>
          <span class="dots">${FB_IC.dots}</span><span class="x">${FB_IC.x}</span>
        </div>
      </div>
      <div class="fbs-spacer"></div>
      <div class="fbs-ctawrap"><div class="fbs-cta${ck(true)}"${optAttr({reply:f.cta})}><span>${esc(f.cta||'Learn More')}</span><span class="ar">${FB_IC.chevR}</span></div></div>
      <div class="fbs-bottom"><div class="reply">Send message</div><span class="ic">${FB_IC.like}</span><span class="ic">${FB_IC.share}</span></div>
      <div class="home-ind dk"></div>
    </div>`;
  }

  // ---------- MARKETPLACE ad ----------
  const MKT_LOCS=['Miami, FL','Austin, TX','Denver, CO','Seattle, WA'];
  function mktFiller(){
    const p=PACKS[ctxId()]||{}; const cats=(p.carousel||[]).slice(0,3);
    return cats.map((c,i)=>`<div class="fbm-card"><img class="img" src="${esc(photo(kwFor(c[0]),400,400))}" alt="${esc(kwFor(c[0]))}"><div class="pr">${esc(c[1]||'$—')}</div><div class="ti">${esc(c[0])}</div><div class="lo">${esc(MKT_LOCS[i%MKT_LOCS.length])}</div></div>`).join('');
  }
  function renderMkt(){
    const f=state.fb;
    const ad=`<div class="fbm-card ad"><img class="img" src="${esc(mediaSrc())}" alt="${esc(mediaAlt())}"><div class="pr">${esc(f.price||'')}</div><div class="ti">${esc(f.headline||f.page)}</div><div class="sp">Sponsored · ${esc(f.page)}</div><div class="cta${ck(true)}"${optAttr({reply:f.cta})}>${esc(f.cta||'Shop Now')}</div></div>`;
    return `<div class="fbm">
      ${statusBar(false)}
      <div class="fbm-head"><span class="tl">Marketplace</span><span class="ic"><span class="c">${FB_IC.search}</span><span class="c">${FB_IC.menu}</span></span></div>
      <div class="fbm-search">${FB_IC.search}<span>Search Marketplace</span></div>
      <div class="fbm-sec">Today's picks</div>
      <div class="fbm-grid">${ad}${mktFiller()}</div>
      <div class="home-ind"></div>
    </div>`;
  }

  // ---------- Render ----------
  const stage=$('#stage');
  stage.addEventListener('error',function(e){ const t=e.target; if(t&&t.tagName==='IMG'&&!t.dataset.fb){ t.dataset.fb='1'; t.src=phGrad(hueOf((t.getAttribute('alt')||t.src||'x').slice(-24))); } },true);

  function render(){
    const android=state.device==='android';
    const head=android?`<div class="punch"></div>`:`<div class="notch"></div>`;
    stage.className='stage'+(state.play?' sim-on':'');
    const badge=state.play?`<div class="sim-badge">● Simulate — tap the CTA</div>`:'';
    const inner=state.format==='story'?renderStory():(state.format==='marketplace'?renderMkt():renderFeed());
    let cap=document.getElementById('capture');
    if(!cap){ cap=document.createElement('div'); cap.id='capture'; stage.innerHTML=''; stage.appendChild(cap); }
    cap.className='phone'+(android?' android':'');
    cap.innerHTML=`${head}${badge}<div class="screen">${inner}</div>`;
    bindOpts(); fitDevice();
  }
  function bindOpts(){ if(!state.play) return; stage.querySelectorAll('[data-opt]').forEach(el=>el.addEventListener('click',e=>{ e.stopPropagation(); const r=el.dataset.reply||''; toast('▸ '+(r?('“'+r+'” → opens '+state.fb.page):('Opens '+state.fb.page))); })); }

  // ======================================================================
  //  TEMPLATES — 6 ad-creative presets per vertical (render in Feed or Story)
  // ======================================================================
  const FB_ARCH=[
    {name:'Product launch',kind:'Promotional',icon:'🆕',desc:'Hero product + Shop Now',
      build:p=>({primary:`New in: ${p.carousel&&p.carousel[0]?p.carousel[0][0]:'the drop'} just landed. ${oneLine(p.offer)} — tap to make it yours. ✨`,headline:cap(p.offer)||'New arrivals are here',desc:`Shop the latest from ${p.brand}.`,cta:'Shop Now',media:photo(p.kw,800,1000,2),reactions:'2,104',comments:'128',shares:'44'})},
    {name:'Flash sale',kind:'Promotional',icon:'⚡',desc:'Urgency + offer',
      build:p=>({primary:`${p.emoji||'🔥'} ${p.offer}. Today only.${p.code?` Use ${p.code} at checkout.`:''}`,headline:cap(p.offer)||'Limited-time offer',desc:p.code?`Use code ${p.code}.`:'Ends tonight.',cta:'Get Offer',media:photo(p.kw,800,1000,5),reactions:'1,276',comments:'64',shares:'88'})},
    {name:'App install',kind:'Transactional',icon:'📲',desc:'Drive installs',
      build:p=>({primary:`Everything ${p.brand} in one app. Join the thousands already tapping in. 👇`,headline:`Get the ${p.brand} app`,desc:'Free on iOS & Android.',cta:'Install Now',media:photo(p.kw,800,1000,3),reactions:'3,510',comments:'212',shares:'120'})},
    {name:'Lead / sign-up',kind:'Flow',icon:'✍️',desc:'Lead-gen CTA',
      build:p=>({primary:`Be first to know. Sign up for early access${p.code?` and grab ${p.code}`:''} — new drops before anyone else.`,headline:'Join the list',desc:'Takes 30 seconds.',cta:'Sign Up',media:photo(p.kw,800,1000,7),reactions:'932',comments:'41',shares:'17'})},
    {name:'Social proof',kind:'Promotional',icon:'⭐',desc:'Testimonial style',
      build:p=>({primary:`“Honestly obsessed.” See why ${p.brand} is everyone's new favourite. ⭐️⭐️⭐️⭐️⭐️`,headline:`Why everyone loves ${p.brand}`,desc:'Rated 4.9/5 by customers.',cta:'Learn More',media:photo(p.kw,800,1000,4),reactions:'5,701',comments:'340',shares:'210'})},
    {name:'Retargeting',kind:'Flow',icon:'🛒',desc:'Cart / win-back',
      build:p=>({primary:oneLine(p.flow&&p.flow.intro)||`Still thinking it over? Your pick at ${p.brand} is waiting — and it's going fast.`,headline:'Your pick is waiting',desc:'Complete your order today.',cta:'Shop Now',media:photo(p.kw,800,1000,6),reactions:'688',comments:'23',shares:'9'})},
  ];
  function templatesFor(){
    const base=PACKS[ctxId()]; if(!base) return [];
    const p=Object.assign({}, base, {kw:KW[ctxId()]||'product'});
    return FB_ARCH.map(a=>({ name:a.name, desc:a.desc, kind:a.kind, flow:a.kind==='Flow', icon:a.icon,
      build:()=>Object.assign({page:p.brand, verified:true, url:p.url||'', time:'2h', price:(p.carousel&&p.carousel[0]?p.carousel[0][1]:'$49')}, a.build(p)) }));
  }
  function renderTemplates(){
    const list=templatesFor(); const g=$('#tplGrid');
    if(!list.length){ g.innerHTML=`<div class="tpl-empty">No preset for this combo — start blank below.</div>`; return; }
    g.innerHTML=list.map((t,i)=>`<button class="tpl" data-i="${i}"><span class="ti">${t.icon}</span><span class="tc"><span class="tt">${esc(t.name)}${t.flow?'<span class="flow">FLOW</span>':''}</span><span class="td">${esc(t.desc)}</span></span></button>`).join('');
    g.querySelectorAll('.tpl').forEach(b=>b.addEventListener('click',()=>applyTemplate(list[+b.dataset.i])));
  }
  function applyTemplate(t){
    const f=t.build();
    if(f.page!=null) state.fb.page=f.page;
    if(f.verified!=null) state.fb.verified=f.verified;
    state.fb.media=f.media||''; state.fb.primary=f.primary||''; state.fb.headline=f.headline||'';
    state.fb.desc=f.desc||''; if(f.url!=null) state.fb.url=f.url; if(f.price!=null) state.fb.price=f.price; state.fb.cta=f.cta||'Shop Now';
    if(f.reactions!=null) state.fb.reactions=f.reactions; if(f.comments!=null) state.fb.comments=f.comments;
    if(f.shares!=null) state.fb.shares=f.shares; if(f.time!=null) state.fb.time=f.time;
    syncEditor(); render(); toast('Template applied'+(t.flow?' · hit Simulate to tap the CTA':''));
  }

  // ---------- Industries ----------
  function fillIndustries(){ $('#selIndustry').innerHTML=INDUSTRIES.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join(''); $('#selIndustry').value=state.industry; }
  function fillSubs(){ const ind=INDUSTRIES.find(i=>i.id===state.industry); const subs=ind?ind.subs:[];
    if(!subs.length){ $('#subWrap').classList.add('hide'); state.sub=null; return; }
    $('#subWrap').classList.remove('hide'); $('#selSub').innerHTML=subs.map(s=>`<option value="${s[0]}">${esc(s[1])}</option>`).join('');
    if(!subs.find(s=>s[0]===state.sub)) state.sub=subs[0][0]; $('#selSub').value=state.sub; }
  function applyIndustryDefaults(){ const ind=INDUSTRIES.find(i=>i.id===state.industry); if(ind){ state.fb.page=ind.biz; } }

  // ---------- Format dropdown (unified top bar) ----------
  const FORMATS=[['feed','Feed ad'],['story','Story ad'],['marketplace','Marketplace ad']];
  function fillFormatSeg(){ const sel=$('#topVar'); sel.innerHTML=FORMATS.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join(''); sel.value=state.format; }
  $('#topVar').addEventListener('change',e=>{ state.format=e.target.value; applyFieldVis(); render(); });
  // Editor fields shown per format: primary/desc/url + engagement are Feed-only;
  // headline is Feed + Marketplace (as the listing title); price is Marketplace-only.
  function applyFieldVis(){
    const f=state.format;
    $('#wPrimary').style.display = f==='feed'?'':'none';
    $('#wHeadline').style.display = (f==='feed'||f==='marketplace')?'':'none';
    $('#wHeadline span').textContent = f==='marketplace'?'Listing title':'Headline (link)';
    $('#wDesc').style.display = f==='feed'?'':'none';
    $('#wUrl').style.display = f==='feed'?'':'none';
    $('#wPrice').style.display = f==='marketplace'?'':'none';
    document.querySelectorAll('.fmt-feed').forEach(g=>{ g.style.display = f==='feed'?'':'none'; });
  }
  const setFormatGroups=applyFieldVis;

  // ---------- CTA select ----------
  function fillCtaSelect(){ const sel=$('#fbCta'); sel.innerHTML=FB_CTAS.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    if(!FB_CTAS.includes(state.fb.cta)){ const o=document.createElement('option'); o.value=state.fb.cta; o.textContent=state.fb.cta; sel.appendChild(o); }
    sel.value=state.fb.cta; }

  // ---------- Editor sync ----------
  function syncEditor(){
    $('#fbPage').value=state.fb.page||'';
    $('#fbVerified').checked=!!state.fb.verified;
    fillCtaSelect();
    $('#fbPrimary').value=state.fb.primary||'';
    $('#fbHeadline').value=state.fb.headline||'';
    $('#fbPrice').value=state.fb.price||'';
    $('#fbDesc').value=state.fb.desc||'';
    $('#fbUrl').value=state.fb.url||'';
    $('#fbReactions').value=state.fb.reactions||'';
    $('#fbComments').value=state.fb.comments||'';
    $('#fbShares').value=state.fb.shares||'';
    $('#fbTime').value=state.fb.time||'';
    const mi=$('#fbMedia'); mi.innerHTML=''; mi.appendChild(imageField(()=>state.fb.media, v=>{ state.fb.media=v; render(); }));
    setFormatGroups();
  }

  // ---------- Field bindings ----------
  $('#fbPage').addEventListener('input',e=>{ state.fb.page=e.target.value; render(); });
  $('#fbVerified').addEventListener('change',e=>{ state.fb.verified=e.target.checked; render(); });
  $('#fbCta').addEventListener('change',e=>{ state.fb.cta=e.target.value; render(); });
  $('#fbPrimary').addEventListener('input',e=>{ state.fb.primary=e.target.value; render(); });
  $('#fbHeadline').addEventListener('input',e=>{ state.fb.headline=e.target.value; render(); });
  $('#fbPrice').addEventListener('input',e=>{ state.fb.price=e.target.value; render(); });
  $('#fbDesc').addEventListener('input',e=>{ state.fb.desc=e.target.value; render(); });
  $('#fbUrl').addEventListener('input',e=>{ state.fb.url=e.target.value; render(); });
  $('#fbReactions').addEventListener('input',e=>{ state.fb.reactions=e.target.value; render(); });
  $('#fbComments').addEventListener('input',e=>{ state.fb.comments=e.target.value; render(); });
  $('#fbShares').addEventListener('input',e=>{ state.fb.shares=e.target.value; render(); });
  $('#fbTime').addEventListener('input',e=>{ state.fb.time=e.target.value; render(); });

  (function(){ const drop=$('#avDrop'),inp=$('#avInput');
    const set=d=>{ state.brandLogo=d; $('#avImg').src=d; $('#avPrev').style.display='flex'; render(); };
    drop.addEventListener('click',()=>inp.click());
    inp.addEventListener('change',()=>{ const f=inp.files[0]; if(f){ const r=new FileReader(); r.onload=()=>set(r.result); r.readAsDataURL(f);} });
    ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
    ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
    drop.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(f){ const r=new FileReader(); r.onload=()=>set(r.result); r.readAsDataURL(f);} });
    $('#avClear').addEventListener('click',e=>{ e.stopPropagation(); state.brandLogo=null; $('#avPrev').style.display='none'; inp.value=''; render(); });
  })();

  function segBind(sel,key,cb){ document.querySelectorAll(sel+' button').forEach(b=>b.addEventListener('click',()=>{ if(b.disabled)return; document.querySelectorAll(sel+' button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state[key]=b.dataset[key]; if(cb)cb(); render(); })); }
  segBind('#deviceSeg','device');

  initChannelNav(['facebook'], v=>{ state.channel=v; render(); });
  $('#selIndustry').addEventListener('change',e=>{ state.industry=e.target.value; fillSubs(); onContextChange(); });
  $('#selSub').addEventListener('change',e=>{ state.sub=e.target.value; onContextChange(); });
  function onContextChange(){ renderTemplates(); const list=templatesFor(); if(list.length){ applyTemplate(list[0]); } else { applyIndustryDefaults(); syncEditor(); render(); } }

  $('#clearMsgs').addEventListener('click',()=>{
    state.fb={ page:state.fb.page, verified:state.fb.verified, media:'', primary:state.format==='feed'?'Your text here.':'', headline:state.format==='marketplace'?'Your listing title':'Your headline', desc:'', url:state.fb.url, price:state.fb.price||'$89', cta:'Shop Now', reactions:'1,204', comments:'18', shares:'6', time:'2h' };
    syncEditor(); render();
  });
  document.querySelectorAll('[data-head]').forEach(h=>h.addEventListener('click',()=>h.closest('[data-group]').classList.toggle('collapsed')));

  $('#btnPlay').addEventListener('click',()=>{ state.play=!state.play; const b=$('#btnPlay'); b.classList.toggle('on',state.play); b.innerHTML=state.play?'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>Editing':'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>Simulate'; render(); toast(state.play?'Simulate on — tap the CTA':'Back to editing'); });

  let tT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }
  async function capture(){ return captureDevice({ background:'#eef0f5', toast }); }
  const exportName=()=>`facebook-${state.format}-${state.industry}`;
  $('#btnExport').addEventListener('click',async()=>{ toast('Rendering…'); try{ const c=await capture(); if(!c)return; const a=document.createElement('a'); a.download=`${exportName()}.png`; a.href=c.toDataURL('image/png'); a.click(); toast('PNG downloaded'); }catch(e){ console.error(e); toast('Export failed — try OS screenshot'); } });
  $('#btnCopy').addEventListener('click',async()=>{ toast('Rendering…'); try{ const c=await capture(); if(!c)return; c.toBlob(async b=>{ try{ await navigator.clipboard.write([new ClipboardItem({'image/png':b})]); toast('Copied to clipboard'); }catch(e){ toast('Clipboard blocked — use Export'); } }); }catch(e){ toast('Copy failed — use Export'); } });

  if(window.ChannelStudioRecorder) ChannelStudioRecorder.init({ button:$('#btnRecord'), getEl:()=>document.getElementById('capture'), toast:toast, filename:exportName });

  // ---------- AI generate: map one schema-locked message into a Facebook ad ----------
  async function applyAI(m, opt){
    const brief=(opt&&opt.brief)||'';
    if(['story','feed','marketplace'].includes(m.type)){ state.format=m.type; const seg=$('#topVar'); if(seg) seg.value=state.format; applyFieldVis(); }
    const copyText=[m.headline,m.body].filter(Boolean).join(' ');
    const dkw=()=> m.imageKeyword || kwFromText(m.imageQuery) || kwFromText(copyText) || kwFromText(brief) || KW[ctxId()] || 'product';
    const portrait=state.format==='story';
    const media=await ChannelStudioAI.photoFor(dkw(), 800, portrait?1400:1000, m.imageQuery);
    const cta=FB_CTAS.includes(m.cta)?m.cta:(m.cta||'Shop Now');
    applyTemplate({ build:()=>({ media, primary:m.body||m.headline||'', headline:m.headline||'', desc:m.desc||'', cta,
      reactions:state.fb.reactions||'1,204', comments:state.fb.comments||'86', shares:state.fb.shares||'32', time:state.fb.time||'2h' }), flow:false });
  }
  if(window.ChannelStudioAI) ChannelStudioAI.init({ button:$('#btnAI'), toast:toast, apply:applyAI,
    channels:['facebook'],
    setChannel:ch=>{ if(ch==='facebook'){ state.channel=ch; $('#selChannel').value=ch; render(); } },
    setBrand:name=>{ if(!name)return; state.fb.page=name; const b=$('#fbPage'); if(b) b.value=name; render(); },
    setIndustry:label=>{ const r=(typeof resolveIndustry==='function')&&resolveIndustry(label); if(!r)return; state.industry=r.industryId; $('#selIndustry').value=r.industryId; fillSubs(); if(r.subId){ state.sub=r.subId; $('#selSub').value=r.subId; } renderTemplates(); },
    setLogo:url=>{ state.brandLogo=url||null; if(url){ $('#avImg').src=url; $('#avPrev').style.display='flex'; } render(); },
    getContext:()=>{ const ind=INDUSTRIES.find(i=>i.id===state.industry); return { channel:'facebook', brand:pageName(), industry:ind?ind.name:state.industry }; } });

  // ---------- Init ----------
  $('#selChannel').value='facebook';
  const qp=new URLSearchParams(location.search); const qf=(qp.get('format')||'').toLowerCase();
  if(qf==='story'||qf==='feed'||qf==='marketplace') state.format=qf;
  fillIndustries(); fillSubs(); fillFormatSeg(); fillCtaSelect(); setFormatGroups();
  renderTemplates();
  const list=templatesFor(); if(list.length){ applyTemplate(list[0]); } else { applyIndustryDefaults(); syncEditor(); render(); }
})();
</script>
</body>
</html>
